<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link rel="stylesheet" href="CSS/app.css" />
  </head>
  <body>
    <div class="container">
      <div class="head">
        <h1 class="tital">My ToDo App</h1>

    </div>

    <script src="JS/script.js"></script>
  </body>
</html>
